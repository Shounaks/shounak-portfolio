    <line x1="10" y1="196" x2="170" y2="196" stroke="#2563eb" stroke-width="0.5" opacity="0.3"/>
    <text x="90" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Tenant C1, C2, C3</text>
